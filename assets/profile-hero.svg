<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Abdulrahman Saad Asiri profile cover</title>
  <desc id="desc">A designed GitHub profile cover for Abdulrahman Saad Asiri, data engineer at stc, AI engineer, and builder focused on Arabic AI and Saudi market intelligence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0b2330"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1280" height="560" rx="34" fill="url(#bg)"/>
  <circle cx="1040" cy="70" r="180" fill="#38bdf8" opacity="0.12" filter="url(#blur)"/>
  <circle cx="108" cy="448" r="190" fill="#22c55e" opacity="0.13" filter="url(#blur)"/>
  <path d="M64 428 C214 336 340 386 486 282 C636 174 768 208 920 266 C1038 310 1126 276 1218 196" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
  <path d="M64 464 C232 356 352 444 510 326 C642 230 790 250 928 314 C1050 370 1132 334 1218 270" fill="none" stroke="#93c5fd" stroke-width="2" opacity="0.34"/>

  <g opacity="0.24" stroke="#cbd5e1" stroke-width="1">
    <path d="M80 96 H1200"/>
    <path d="M80 176 H1200"/>
    <path d="M80 256 H1200"/>
    <path d="M80 336 H1200"/>
    <path d="M80 416 H1200"/>
    <path d="M200 64 V496"/>
    <path d="M400 64 V496"/>
    <path d="M600 64 V496"/>
    <path d="M800 64 V496"/>
    <path d="M1000 64 V496"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="72" y="92" fill="#94a3b8" font-size="20" font-weight="800" letter-spacing="2">RIYADH / STC / ARABIC AI / SAUDI MARKETS</text>
    <text x="72" y="170" fill="#ffffff" font-size="66" font-weight="900">Abdulrahman Saad Asiri</text>
    <text x="76" y="216" fill="#dbeafe" font-size="30" font-weight="800">Data Engineer · AI Engineer · Market-Intelligence Builder</text>
    <text x="76" y="266" fill="#cbd5e1" font-size="22">I build reliable data platforms, Arabic AI systems, and financial intelligence products.</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="76" y="308" width="176" height="50" rx="16" fill="#052e16" stroke="#22c55e"/>
    <text x="104" y="340" fill="#bbf7d0" font-size="18" font-weight="800">Data Platforms</text>
    <rect x="270" y="308" width="154" height="50" rx="16" fill="#082f49" stroke="#38bdf8"/>
    <text x="300" y="340" fill="#bae6fd" font-size="18" font-weight="800">LLM Systems</text>
    <rect x="442" y="308" width="154" height="50" rx="16" fill="#312e81" stroke="#a78bfa"/>
    <text x="476" y="340" fill="#ddd6fe" font-size="18" font-weight="800">Arabic NLP</text>
    <rect x="614" y="308" width="178" height="50" rx="16" fill="#422006" stroke="#facc15"/>
    <text x="644" y="340" fill="#fef3c7" font-size="18" font-weight="800">Tadawul Signals</text>
