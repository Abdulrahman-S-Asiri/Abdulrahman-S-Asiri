    <text x="26" y="31" fill="#f8fafc" font-size="20" font-weight="900">Current mission</text>
    <text x="26" y="57" fill="#cbd5e1" font-size="17">Turn messy data into intelligence, then into useful Arabic AI and market products.</text>
