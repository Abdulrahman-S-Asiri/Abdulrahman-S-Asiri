<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-labelledby="title desc">
  <title id="title">Technology stack map</title>
  <desc id="desc">A visual technology stack map covering AI, data, backend, frontend, and markets.</desc>
  <rect width="1280" height="430" rx="28" fill="#0b1020"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="64" y="66" fill="#ffffff" font-size="36" font-weight="900">Stack map</text>
    <text x="64" y="100" fill="#94a3b8" font-size="18">The tools I use to move from raw data to usable products.</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">
    <g transform="translate(64 150)">
      <rect width="210" height="210" rx="22" fill="#052e16" stroke="#22c55e"/>
      <text x="24" y="42" fill="#bbf7d0" font-size="22" font-weight="900">AI / ML</text>
      <text x="24" y="78" fill="#dcfce7">PyTorch</text>
      <text x="24" y="108" fill="#dcfce7">Transformers</text>
      <text x="24" y="138" fill="#dcfce7">Embeddings</text>
      <text x="24" y="168" fill="#dcfce7">RAG · Agents</text>
    </g>
    <g transform="translate(304 150)">
      <rect width="210" height="210" rx="22" fill="#082f49" stroke="#38bdf8"/>
      <text x="24" y="42" fill="#bae6fd" font-size="22" font-weight="900">Data</text>
      <text x="24" y="78" fill="#e0f2fe">PostgreSQL</text>
      <text x="24" y="108" fill="#e0f2fe">Redis</text>
      <text x="24" y="138" fill="#e0f2fe">pandas · NumPy</text>
      <text x="24" y="168" fill="#e0f2fe">SQL pipelines</text>
    </g>
    <g transform="translate(544 150)">
      <rect width="210" height="210" rx="22" fill="#312e81" stroke="#a78bfa"/>
      <text x="24" y="42" fill="#ddd6fe" font-size="22" font-weight="900">Backend</text>
      <text x="24" y="78" fill="#ede9fe">FastAPI</text>
      <text x="24" y="108" fill="#ede9fe">Flask</text>
      <text x="24" y="138" fill="#ede9fe">REST APIs</text>
      <text x="24" y="168" fill="#ede9fe">WebSockets</text>
    </g>
    <g transform="translate(784 150)">
      <rect width="210" height="210" rx="22" fill="#422006" stroke="#facc15"/>
      <text x="24" y="42" fill="#fef3c7" font-size="22" font-weight="900">Frontend</text>
      <text x="24" y="78" fill="#fef9c3">React</text>
      <text x="24" y="108" fill="#fef9c3">Next.js</text>
      <text x="24" y="138" fill="#fef9c3">TypeScript</text>
      <text x="24" y="168" fill="#fef9c3">Tailwind CSS</text>
    </g>
    <g transform="translate(1024 150)">
      <rect width="192" height="210" rx="22" fill="#1f2937" stroke="#94a3b8"/>
      <text x="24" y="42" fill="#f8fafc" font-size="22" font-weight="900">Markets</text>
      <text x="24" y="78" fill="#e2e8f0">Tadawul</text>
      <text x="24" y="108" fill="#e2e8f0">US equities</text>
      <text x="24" y="138" fill="#e2e8f0">Technical analysis</text>
      <text x="24" y="168" fill="#e2e8f0">Portfolio analytics</text>
    </g>
  </g>
</svg>
