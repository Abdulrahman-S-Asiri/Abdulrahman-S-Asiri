<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Abdulrahman identity system</title>
  <desc id="desc">A designed diagram showing Abdulrahman's role, technical domains, market focus, and learning path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
