<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Builder map</title>
  <desc id="desc">A map connecting Abdulrahman's work across data engineering, AI systems, Arabic NLP, and financial markets.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="22" fill="url(#panel)"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="60" y="62" fill="#ffffff" font-size="34" font-weight="900">How my work connects</text>
    <text x="60" y="96" fill="#94a3b8" font-size="18">Data quality -> AI systems -> Arabic products -> market intelligence</text>
  </g>
  <path d="M185 222 H1015" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(185 222)">
      <circle r="72" fill="#052e16" stroke="#22c55e" stroke-width="3"/>
      <text y="-18" fill="#bbf7d0" font-size="22" font-weight="900">Data</text>
      <text y="12" fill="#dcfce7" font-size="16">pipelines</text>
      <text y="38" fill="#dcfce7" font-size="16">quality</text>
    </g>
    <g transform="translate(462 222)">
      <circle r="72" fill="#082f49" stroke="#38bdf8" stroke-width="3"/>
      <text y="-18" fill="#bae6fd" font-size="22" font-weight="900">AI</text>
      <text y="12" fill="#e0f2fe" font-size="16">LLMs</text>
      <text y="38" fill="#e0f2fe" font-size="16">agents</text>
    </g>
    <g transform="translate(739 222)">
      <circle r="72" fill="#312e81" stroke="#a78bfa" stroke-width="3"/>
      <text y="-18" fill="#ddd6fe" font-size="22" font-weight="900">Arabic</text>
      <text y="12" fill="#ede9fe" font-size="16">NLP</text>
      <text y="38" fill="#ede9fe" font-size="16">RAG</text>
    </g>
    <g transform="translate(1015 222)">
      <circle r="72" fill="#422006" stroke="#facc15" stroke-width="3"/>
      <text y="-18" fill="#fef3c7" font-size="22" font-weight="900">Markets</text>
      <text y="12" fill="#fef9c3" font-size="16">Tadawul</text>
      <text y="38" fill="#fef9c3" font-size="16">signals</text>
    </g>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#cbd5e1">
    <rect x="72" y="336" width="1056" height="46" rx="14" fill="#020617" stroke="#334155"/>
    <text x="105" y="366">My strongest projects sit where these circles overlap: reliable data, evaluated AI behavior, Arabic-first UX, and practical financial analysis.</text>
  </g>
</svg>
